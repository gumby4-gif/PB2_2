<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Designing with Native Plants — Bunny Hill Landscape Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../main.css">
  <link rel="stylesheet" href="../../blog/assets/css/styles.css">
  <style>
    /* ── POST NAV BAR ── */
    .post-nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 4rem;
      border-bottom: 1px solid var(--linen);
      background: var(--warm-white);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .post-nav-bar a {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      font-weight: 300;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      transition: color 0.3s;
    }

    .post-nav-bar a:hover { color: var(--forest); }

    .post-nav-bar a svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      flex-shrink: 0;
    }

    .post-nav-bar .nav-center {
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--sage);
      font-weight: 300;
    }

    /* hide prev/next if not applicable */
    .post-nav-bar a.disabled {
      opacity: 0;
      pointer-events: none;
    }

    /* ── POST BODY ── */
    .blog-post {
      max-width: 780px;
      margin: 4rem auto;
      padding: 0 2rem 6rem;
    }

    .post-eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--sage);
      font-weight: 300;
      margin-bottom: 1.2rem;
    }

    .blog-post h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 4vw, 3.6rem);
      font-weight: 300;
      color: var(--forest);
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    .post-meta {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-soft);
      font-weight: 300;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--linen);
    }

    .blog-post .hero-img {
      width: 100%;
      border-radius: 4px;
      margin-bottom: 3rem;
      display: block;
    }

    .blog-post h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--forest);
      margin: 3rem 0 1rem;
    }

    .blog-post h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--moss);
      margin: 2rem 0 0.75rem;
    }

    .blog-post p {
      font-size: 1rem;
      color: var(--ink-soft);
      line-height: 1.85;
      font-weight: 300;
      margin-bottom: 1.6rem;
    }

    .blog-post img {
      width: 100%;
      border-radius: 4px;
      margin: 2.5rem 0;
      display: block;
    }

    /* ── BOTTOM POST NAV ── */
    .post-nav-bottom {
      max-width: 780px;
      margin: 0 auto;
      padding: 3rem 2rem;
      border-top: 1px solid var(--linen);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: center;
    }

    .post-nav-bottom a {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      font-weight: 300;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      transition: color 0.3s;
    }

    .post-nav-bottom a:hover { color: var(--forest); }

    .post-nav-bottom a svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      flex-shrink: 0;
    }

    .post-nav-bottom .nav-next {
      justify-self: end;
    }

    .post-nav-bottom .nav-category {
      justify-self: center;
      color: var(--sage);
    }

    .post-nav-bottom a.disabled {
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .post-nav-bar { padding: 1rem 1.2rem; }
      .post-nav-bar .nav-center { display: none; }
      .blog-post { margin: 2rem auto; padding: 0 1.2rem 4rem; }
      .post-nav-bottom {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
      }
      .post-nav-bottom .nav-category {
        grid-column: 1 / -1;
        justify-self: center;
        order: -1;
        margin-bottom: 0.5rem;
      }
    }
  </style>
</head>
<body>

  <nav class="post-nav-bar">

    <!-- Previous Post — set href, or add class="disabled" if none -->

      Previous Post
    </a>

    <!-- Category label in centre -->
    <span class="nav-center">Planting Plans</span>

    <!-- Next Post — set href, or add class="disabled" if none -->
    <a href="../next-post/index.html">
      Next Post
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>

  </nav>

  <!-- ── POST CONTENT ── -->
  <article class="blog-post">

    <p class="post-eyebrow">Planting Plans</p>
    <h1>Designing with Native Plants</h1>

    <img class="hero-img" src="../../assets/images/Native-Plant-Guides-Collage.jpg" alt="Native Plant Guides" width="50" height="50">

  </article>

  <!-- ── BOTTOM NAV ── -->
  <div class="post-nav-bottom">

    <!-- Previous Post -->
    <a href="../previous-post/index.html">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Previous Post
    </a>

    <!-- Back to Category -->
    <a class="nav-category" href="../../categories/planting-plans.html">
      ↑ Back to Planting Plans
    </a>

    <!-- Next Post -->
    <a class="nav-next" href="../next-post/index.html">
      Next Post
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>

  </div>

</body>
</html>
